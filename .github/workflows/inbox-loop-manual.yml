name: Inbox loop Jun 22 PM
"on":
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Write queue
        run: node -e "const fs=require('fs');fs.writeFileSync('data/inbox-queue.json',JSON.stringify([{advertiser:'Nebraska Groundswell',amount:75395,side:'R',districtHint:'NE Senate',kind:'group',flight:'6/23-6/29',source:'inbox',sourceKey:'ne-groundswell-jun22',correction:false},{advertiser:'Graham Platner',amount:237559,side:'D',districtHint:'ME Senate',kind:'candidate',flight:'6/23-6/29',source:'inbox',sourceKey:'me-platner-jun22',correction:false},{advertiser:'Susan Collins',amount:21630,side:'R',districtHint:'ME Senate',kind:'candidate',flight:'6/23-7/1',source:'inbox',sourceKey:'me-collins-jun22',correction:false},{advertiser:'WinSenate',amount:267169,side:'D',districtHint:'ME Senate',kind:'group',flight:'6/16-8/10',source:'inbox',sourceKey:'me-winsenate-jun22',correction:true},{advertiser:'Pine Tree Results PAC',amount:159840,side:'R',districtHint:'ME Senate',kind:'group',flight:'6/16-6/29',source:'inbox',sourceKey:'me-pinetree-jun22',correction:false},{advertiser:'Majority Forward',amount:30099,side:'D',districtHint:'ME Senate',kind:'group',flight:'6/17-7/6',source:'inbox',sourceKey:'me-majfwd-jun22',correction:false},{advertiser:'Campaign for America First International Assistance',amount:139469,side:'R',districtHint:'ME Senate',kind:'group',flight:'6/20-7/5',source:'inbox',sourceKey:'me-cafia-jun22',correction:false},{advertiser:'Stronger America',amount:70700,side:'R',districtHint:'ME Senate',kind:'group',flight:'6/23-6/28',source:'inbox',sourceKey:'me-stronger-america-jun22',correction:false},{advertiser:'Abdul El-Sayed',amount:291055,side:'D',districtHint:'MI Senate',kind:'candidate',flight:'6/23-6/29',source:'inbox',sourceKey:'mi-elsayed-jun22',correction:false},{advertiser:'Mallory McMorrow',amount:129300,side:'D',districtHint:'MI Senate',kind:'candidate',flight:'6/23-6/29',source:'inbox',sourceKey:'mi-mcmorrow-jun22',correction:false},{advertiser:'United Democracy Project',amount:1394277,side:'D',districtHint:'MI Senate',kind:'group',flight:'6/23-6/29',source:'inbox',sourceKey:'mi-udp-jun22',correction:false},{advertiser:'A Stronger Michigan',amount:29500,side:'D',districtHint:'MI Senate',kind:'group',flight:'6/18-6/24',source:'inbox',sourceKey:'mi-astronger-jun22',correction:false},{advertiser:'Donavan McKinney',amount:67100,side:'D',districtHint:'MI CD-13',kind:'candidate',flight:'6/23-6/29',source:'inbox',sourceKey:'mi13-mckinney-jun22',correction:false},{advertiser:'Mary Peltola',amount:57590,side:'D',districtHint:'AK Senate',kind:'candidate',flight:'6/23-6/29',source:'inbox',sourceKey:'ak-peltola-jun22',correction:false}]))"
      - name: Ingest
        run: node scripts/inbox-ingest.js
      - name: Wrap and push
        run: |
          node scripts/wrap.js
          git config user.name politic-stuff
          git config user.email politic-stuff@users.noreply.github.com
          git add data/data.json data/data.js
          git diff --staged --quiet || git commit -m "Inbox loop Jun 22 PM"
          git push
