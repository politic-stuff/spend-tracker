                                                                                                                                                                                                                                                                                                                                                                                                                      git config user.name "politic-stuff"
                                                                                                                                                                                                                                                                                                                                                                                                                                git config user.email "politic-stuff@users.noreply.github.com"
                                                                                                                                                                                                                                                                                                                                                                                                                                          git add data/data.json data/data.js
                                                                                                                                                                                                                                                                                                                                                                                                                                                    git diff --staged --quiet || git commit -m "Inbox loop: Jun 22 PM - 14 spend updates (NE/ME/MI/AK Senate, MI CD-13)"
