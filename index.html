<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Race Spend Tracker — 2026</title>
<link rel="icon" href="favicon.svg">
<style>
  :root{
    --bg:#0b0f17; --card:#141a26; --card2:#1b2230; --line:#26304a;
    --txt:#e7ecf5; --muted:#9aa6bd; --accent:#5b8cff; --accent2:#7aa2ff;
    --fed:#3fb98a; --state:#c08adb; --warn:#e6a23c; --bad:#e06c75;
    --good:#3fb98a; --info:#5b8cff; --sample:#6b7689;
  }
  [data-theme="light"]{
    --bg:#f4f6fb; --card:#ffffff; --card2:#f0f3fa; --line:#dde3ef;
    --txt:#10151f; --muted:#5a6577; --accent:#2f5fe0; --accent2:#2f5fe0;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  a{color:var(--accent2);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:1180px;margin:0 auto;padding:20px 18px 80px}
  header{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-bottom:6px}
  h1{font-size:22px;margin:0;letter-spacing:.2px}
  .sub{color:var(--muted);font-size:13px;margin:2px 0 18px}
  .spacer{flex:1}
  .btn{background:var(--card2);border:1px solid var(--line);color:var(--txt);
    border-radius:9px;padding:7px 11px;font-size:13px;cursor:pointer}
  .btn:hover{border-color:var(--accent)}
  .controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
  .controls input,.controls select{background:var(--card);border:1px solid var(--line);
    color:var(--txt);border-radius:9px;padding:8px 10px;font-size:13px}
  .controls input{flex:1;min-width:180px}
  .legend{display:flex;flex-wrap:wrap;gap:14px;font-size:12px;color:var(--muted);margin-bottom:16px}
  .legend b{color:var(--txt);font-weight:600}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:999px;
    font-size:11px;font-weight:600;border:1px solid var(--line);white-space:nowrap}
  .pill.fed{color:var(--fed);border-color:color-mix(in srgb,var(--fed) 45%,transparent)}
  .pill.state{color:var(--state);border-color:color-mix(in srgb,var(--state) 45%,transparent)}
  .pill.active{color:var(--good)} .pill.past{color:var(--muted)}
  .conf{font-size:10px;padding:1px 6px;border-radius:6px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
  .conf.fec{background:color-mix(in srgb,var(--fed) 20%,transparent);color:var(--fed)}
  .conf.confirmed{background:color-mix(in srgb,var(--info) 22%,transparent);color:var(--accent2)}
  .conf.adimpact{background:color-mix(in srgb,var(--accent) 26%,transparent);color:var(--accent2)}
  .conf.estimate{background:color-mix(in srgb,var(--warn) 20%,transparent);color:var(--warn)}
  .conf.sample{background:color-mix(in srgb,var(--sample) 22%,transparent);color:var(--sample)}
  .spendrow.secondary{opacity:.5;font-size:11.5px;border-top:none;padding:1px 0 1px 10px}
  .spendrow.secondary .amt{font-weight:500}
  .bucketlbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px}
  .card.fed{border-left:3px solid var(--fed)} .card.state{border-left:3px solid var(--state)}
  .chead{display:flex;align-items:flex-start;gap:8px;margin-bottom:4px}
  .cname{font-size:16px;font-weight:700}
  .coffice{color:var(--muted);font-size:12.5px}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 10px}
  .total{font-size:24px;font-weight:800;letter-spacing:.3px}
  .total small{font-size:12px;font-weight:600;color:var(--muted)}
  .spendrow{display:flex;justify-content:space-between;align-items:center;gap:8px;
    padding:6px 0;border-top:1px dashed var(--line);font-size:13px}
  .spendrow .amt{font-weight:700;font-variant-numeric:tabular-nums}
  .actor{color:var(--muted)}
  .ads{margin-top:10px;border-top:1px solid var(--line);padding-top:9px}
  .ads h4{margin:0 0 6px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .ad{display:flex;gap:7px;align-items:baseline;font-size:13px;padding:3px 0}
  .ad .plat{font-size:10px;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:0 5px;flex:none}
  .socials{margin-top:10px;display:flex;gap:10px;font-size:12px}
  .empty{color:var(--muted);font-size:12.5px;font-style:italic}
  .changelog{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:20px}
  .changelog h3{margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .changelog li{font-size:13px;margin-bottom:4px;color:var(--txt)}
  .changelog .t{color:var(--muted);font-size:11px}
  .sectionhead{margin:22px 0 10px;font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
  .count{color:var(--muted);font-weight:400}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🎯 Race Spend Tracker</h1>
    <span class="spacer"></span>
    <button class="btn" id="theme">◐ Theme</button>
  </header>
  <div class="sub" id="updated">Loading…</div>

  <div class="changelog" id="changelog" hidden>
    <h3>What changed</h3>
    <ul id="changelist"></ul>
  </div>

  <div class="controls">
    <input id="q" placeholder="Search candidate, office, state…">
    <select id="status">
      <option value="active">Active races</option>
      <option value="all">All races</option>
      <option value="past">Decided / past</option>
    </select>
    <select id="level">
      <option value="all">Federal + State</option>
      <option value="federal">Federal only</option>
      <option value="state">State only</option>
    </select>
    <select id="sort">
      <option value="spend">Sort: total spend</option>
      <option value="date">Sort: race date</option>
      <option value="name">Sort: name</option>
    </select>
  </div>

  <div class="legend">
    <span><span class="pill fed">FEDERAL</span> FEC-tracked</span>
    <span><span class="pill state">STATE</span> state portal / manual</span>
    <span><b>Trust (headline source ↓):</b></span>
    <span><span class="conf confirmed">Inbox</span> competitive inbox</span>
    <span><span class="conf adimpact">AdImpact</span> your account</span>
    <span><span class="conf fec">FEC</span> filed</span>
    <span><span class="conf estimate">Estimate</span> public</span>
    <span><span class="conf sample">Sample</span> placeholder</span>
  </div>

  <div id="board"></div>
</div>

<script src="data/data.js"></script>
<script>
const D = window.TRACKER_DATA || {candidates:[]};
const $ = s => document.querySelector(s);
const today = "2026-06-17"; // updated by feeder; client compares as ISO string

function fmt(n){
  if(!n) return "$0";
  if(n>=1e6) return "$"+(n/1e6).toFixed(n>=1e7?0:1)+"M";
  if(n>=1e3) return "$"+(n/1e3).toFixed(0)+"K";
  return "$"+n.toLocaleString();
}
function isActive(c){
  if(c.result==="lost") return false;
  if(c.raceType==="general") return true;
  return (c.raceDate||"") >= today; // upcoming primary
}
// Trust order for picking the headline figure per bucket (higher wins).
const PRI={"confirmed-inbox":5,"adimpact":4,"FEC":3,"FEC Schedule E":3,"estimate":2,"sample":0};
const BUCKETS=[["self","Candidate"],["support","Outside · supporting"],["oppose","Outside · opposing"],["other","Other"]];
// Reconcile sources so overlapping reports never double-count: within each
// bucket, the highest-trust source is the counted figure; the rest are shown
// muted as "also reported".
function reconcile(c){
  const rows=c.spend||[];
  const groups={};
  for(const r of rows){const b=r.bucket||(r.type==="candidate"?"self":"support");(groups[b]=groups[b]||[]).push(r);}
  let total=0; const out=[];
  for(const [b,lbl] of BUCKETS){
    const g=groups[b]; if(!g||!g.length) continue;
    g.sort((a,z)=>(PRI[z.confidence]||1)-(PRI[a.confidence]||1) || (z.amount||0)-(a.amount||0));
    const chosen=g[0];
    if(chosen.confidence!=="sample") total+=chosen.amount||0;
    out.push({bucket:lbl, chosen, others:g.slice(1)});
  }
  return {total, groups:out};
}
function total(c){ return reconcile(c).total; }

// header + changelog
$("#updated").textContent = D.lastUpdated
  ? `Last updated ${D.lastUpdated} · ${D.counts?.total||D.candidates.length} candidates tracked · cycle ${D.cycle||""}`
  : `Not yet refreshed — showing seed data · ${D.candidates.length} candidates`;
if(D.changelog && D.changelog.length){
  $("#changelog").hidden=false;
  $("#changelist").innerHTML = D.changelog.slice(0,8).map(e=>
    `<li><span class="t">${e.ts||"—"}</span> · ${e.note}</li>`).join("");
}

function render(){
  const q=$("#q").value.toLowerCase().trim();
  const status=$("#status").value, level=$("#level").value, sort=$("#sort").value;
  let list = D.candidates.filter(c=>{
    if(level!=="all" && c.level!==level) return false;
    const act=isActive(c);
    if(status==="active" && !act) return false;
    if(status==="past" && act) return false;
    if(q){
      const hay=(c.name+" "+c.office+" "+c.state).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  list.sort((a,b)=>{
    if(sort==="spend") return total(b)-total(a);
    if(sort==="date") return (a.raceDate||"").localeCompare(b.raceDate||"");
    return a.name.localeCompare(b.name);
  });

  const board=$("#board");
  if(!list.length){ board.innerHTML='<p class="empty">No races match.</p>'; return; }
  board.innerHTML = `<div class="sectionhead">${list.length} race${list.length>1?"s":""} <span class="count">· sorted by ${sort}</span></div>`
    + `<div class="grid">${list.map(card).join("")}</div>`;
}

function card(c){
  const rec=reconcile(c);
  const t=rec.total;
  const spendRows=rec.groups.length ? rec.groups.map(g=>{
    const s=g.chosen;
    const main=`<div class="spendrow"><span class="actor"><span class="bucketlbl">${g.bucket}</span> · ${s.actor} `
      +`<span class="conf ${cls(s.confidence)}">${label(s.confidence)}</span></span>`
      +`<span class="amt">${fmt(s.amount)}</span></div>`;
    const also=g.others.map(o=>`<div class="spendrow secondary"><span class="actor">also: ${o.actor} `
      +`<span class="conf ${cls(o.confidence)}">${label(o.confidence)}</span></span>`
      +`<span class="amt">${fmt(o.amount)}</span></div>`).join("");
    return main+also;
  }).join("") : `<div class="empty">No spend recorded yet.</div>`;
  const ads=(c.ads||[]).length
    ? `<div class="ads"><h4>Ads running (${c.ads.length})</h4>`
      + c.ads.map(a=>`<div class="ad"><span class="plat">${a.platform||"web"}</span>`
        +`<a href="${a.url}" target="_blank" rel="noopener">${a.title}</a></div>`).join("")+`</div>`
    : `<div class="ads"><h4>Ads running</h4><div class="empty">None detected yet.</div></div>`;
  const soc=Object.entries(c.links||{}).filter(([k,v])=>v)
    .map(([k,v])=>`<a href="${v}" target="_blank" rel="noopener">${k}</a>`).join("");
  return `<div class="card ${c.level}">
    <div class="chead">
      <div><div class="cname">${c.name}</div><div class="coffice">${c.office} · ${c.state}</div></div>
    </div>
    <div class="badges">
      <span class="pill ${c.level}">${c.level.toUpperCase()}</span>
      <span class="pill ${isActive(c)?"active":"past"}">${isActive(c)?"● Active":"Decided"}${c.result?" · "+c.result:""}</span>
      <span class="pill">${c.raceType} · ${c.raceDate||"TBD"}</span>
    </div>
    <div class="total">${fmt(t)} <small>total tracked</small></div>
    ${spendRows}
    ${ads}
    ${soc?`<div class="socials">${soc}</div>`:""}
  </div>`;
}
function cls(c){return ({FEC:"fec","FEC Schedule E":"fec","confirmed-inbox":"confirmed",adimpact:"adimpact",estimate:"estimate",sample:"sample"})[c]||"estimate";}
function label(c){return ({FEC:"FEC","FEC Schedule E":"FEC",confirmed:"Confirmed","confirmed-inbox":"Inbox",adimpact:"AdImpact",estimate:"Est",sample:"Sample"})[c]||"Est";}

["q","status","level","sort"].forEach(id=>$("#"+id).addEventListener("input",render));
const th=$("#theme");
function applyTheme(t){document.documentElement.dataset.theme=t;localStorage.spendTheme=t;}
th.addEventListener("click",()=>applyTheme(document.documentElement.dataset.theme==="light"?"dark":"light"));
applyTheme(localStorage.spendTheme||"dark");
render();
</script>
</body>
</html>
