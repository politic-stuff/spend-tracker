<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Race Spend Tracker — 2026</title>
<link rel="icon" href="favicon.svg">
<style>
  :root{
    --bg:#0a0d14; --surface:#121722; --surface2:#1a212e; --line:#222b3b; --line2:#2c3750;
    --txt:#eef2f8; --txt2:#aab4c6; --muted:#7d8aa0;
    --dem:#5b8cff; --rep:#f0606e; --ind:#c08adb;
    --good:#38c39a; --warn:#e8a93c; --accent:#6e8bff; --accent2:#8aa4ff;
    --radius:16px; --shadow:0 1px 3px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.18);
  }
  [data-theme="light"]{
    --bg:#f5f7fb; --surface:#ffffff; --surface2:#f1f4fa; --line:#e4e9f2; --line2:#d4dbe8;
    --txt:#0e1422; --txt2:#48536a; --muted:#7a869c; --accent:#3a5bd9; --accent2:#3a5bd9;
    --shadow:0 1px 2px rgba(16,28,60,.06),0 8px 24px rgba(16,28,60,.06);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--txt);
    font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px 90px}
  /* top bar */
  .topbar{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 88%,transparent);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
  .topbar .inner{max-width:1080px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:14px}
  .brand{font-size:19px;font-weight:800;letter-spacing:-.2px;display:flex;align-items:center;gap:9px;white-space:nowrap}
  .brand .logo{width:26px;height:26px}
  .search{flex:1;min-width:0;display:flex;align-items:center;gap:9px;background:var(--surface);
    border:1px solid var(--line);border-radius:12px;padding:9px 13px}
  .search input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-size:15px}
  .search svg{flex:none;opacity:.6}
  .iconbtn{background:var(--surface);border:1px solid var(--line);color:var(--txt2);border-radius:11px;
    padding:9px 12px;font-size:14px;cursor:pointer;white-space:nowrap}
  .iconbtn:hover{border-color:var(--accent);color:var(--txt)}
  /* updates drawer */
  .updates{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    margin:16px 0;box-shadow:var(--shadow);overflow:hidden}
  .updates summary{list-style:none;cursor:pointer;padding:14px 18px;display:flex;align-items:center;gap:10px;font-weight:600}
  .updates summary::-webkit-details-marker{display:none}
  .updates summary .chev{margin-left:auto;transition:transform .2s;color:var(--muted)}
  .updates[open] summary .chev{transform:rotate(90deg)}
  .updates .latest{color:var(--txt2);font-weight:400;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .updates ul{margin:0;padding:0 18px 14px 38px;border-top:1px solid var(--line)}
  .updates li{font-size:14px;color:var(--txt2);margin:8px 0;line-height:1.45}
  .updates .t{color:var(--muted);font-size:12px;margin-right:6px}
  .sub{color:var(--muted);font-size:13.5px;margin:14px 2px}
  /* controls */
  .controls{display:flex;flex-wrap:wrap;gap:10px;margin:8px 0 20px}
  .controls select{background:var(--surface);border:1px solid var(--line);color:var(--txt);
    border-radius:11px;padding:9px 13px;font-size:14px;cursor:pointer}
  .seg{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:11px;overflow:hidden}
  .seg button{background:none;border:none;color:var(--muted);padding:9px 14px;font-size:13.5px;cursor:pointer}
  .seg button.on{background:var(--surface2);color:var(--txt);font-weight:600}
  .counthd{font-size:13px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin:6px 2px 12px}
  /* race rows (overview) */
  .rrow{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--line);
    border-radius:14px;padding:15px 18px;margin-bottom:11px;cursor:pointer;transition:border-color .15s,transform .05s;box-shadow:var(--shadow)}
  .rrow:hover{border-color:var(--line2);transform:translateY(-1px)}
  .rrow .rinfo{flex:1;min-width:0}
  .rrow .rt{font-size:17px;font-weight:700;letter-spacing:-.2px}
  .rrow .rmeta{font-size:13px;color:var(--muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .chip{font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;border:1px solid var(--line2)}
  .chip.gen{color:var(--good);border-color:color-mix(in srgb,var(--good) 40%,transparent)}
  .chip.pri{color:var(--warn);border-color:color-mix(in srgb,var(--warn) 40%,transparent)}
  .barwrap{flex:1.2;min-width:170px;max-width:320px}
  .bar{height:9px;border-radius:6px;background:var(--surface2);display:flex;overflow:hidden}
  .bar .d{background:var(--dem)} .bar .r{background:var(--rep)} .bar .i{background:var(--ind)}
  .barlbl{display:flex;justify-content:space-between;font-size:12px;margin-top:5px;color:var(--txt2)}
  .barlbl .dem{color:var(--dem)} .barlbl .rep{color:var(--rep)} .barlbl b{color:var(--txt)}
  .who{display:flex;align-items:center;gap:9px;flex:none;width:188px}
  .who .nm{font-size:14px;font-weight:600;line-height:1.2}
  .who .role{font-size:11.5px;color:var(--muted)}
  .chev{color:var(--muted);flex:none}
  /* avatar */
  .av{width:38px;height:38px;border-radius:50%;flex:none;object-fit:cover;background:var(--surface2);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;border:2px solid var(--line2)}
  .av.D{border-color:var(--dem);color:var(--dem)} .av.R{border-color:var(--rep);color:var(--rep)} .av.I{border-color:var(--ind);color:var(--ind)}
  .av.lg{width:72px;height:72px;font-size:24px;border-width:3px}
  /* detail */
  .back{display:inline-flex;align-items:center;gap:7px;color:var(--txt2);font-size:14px;margin:18px 0 10px;cursor:pointer}
  .back:hover{color:var(--txt)}
  .dhead{font-size:30px;font-weight:800;letter-spacing:-.5px;margin:4px 0 2px}
  .dmeta{color:var(--muted);font-size:14.5px;margin-bottom:4px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .seat{color:var(--txt2);font-size:13.5px;margin-bottom:18px}
  .matchup{display:flex;align-items:stretch;gap:14px;margin:18px 0}
  .mcard{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;gap:13px;align-items:center;box-shadow:var(--shadow)}
  .mcard .nm{font-size:17px;font-weight:700}
  .mcard .role{font-size:13px;color:var(--muted);margin-top:1px}
  .mcard .amt{font-size:15px;font-weight:700;margin-top:5px}
  .mcard.D .amt{color:var(--dem)} .mcard.R .amt{color:var(--rep)} .mcard.I .amt{color:var(--ind)}
  .vs{align-self:center;font-weight:800;color:var(--muted);font-size:14px}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin:14px 0;box-shadow:var(--shadow)}
  .panel h3{margin:0 0 14px;font-size:13px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted)}
  /* big spend bar */
  .bigbar{display:flex;gap:0;border-radius:12px;overflow:hidden;height:44px;margin-bottom:8px}
  .bigbar .seg2{display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;min-width:48px}
  .bigbar .d{background:var(--dem)} .bigbar .r{background:var(--rep)} .bigbar .i{background:var(--ind)}
  .bbnum{display:flex;justify-content:space-between;font-size:13px;color:var(--muted)}
  /* media-week grid */
  .wgridwrap{overflow-x:auto;margin:0 -4px}
  .wgrid{border-collapse:collapse;font-size:13px;min-width:100%}
  .wgrid th,.wgrid td{padding:7px 10px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap;font-variant-numeric:tabular-nums}
  .wgrid th{color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.3px;position:sticky;top:0}
  .wgrid td.mkt,.wgrid th.mkt{text-align:left;font-weight:600;position:sticky;left:0;background:var(--surface)}
  .wgrid .cell{color:var(--txt)} .wgrid .zero{color:var(--muted);opacity:.4}
  .wgrid tr.tot td{font-weight:800;border-top:2px solid var(--line2)}
  .wgrid td.rtot{font-weight:800;border-left:1px solid var(--line2)}
  .wgrid th.wk small{display:block;font-weight:400;color:var(--muted);font-size:9.5px;text-transform:none;letter-spacing:0}
  .wknote{font-size:12px;color:var(--muted);margin:4px 2px 0}
  .gridtoggle{float:right;font-size:12px;color:var(--accent2);cursor:pointer;font-weight:600}
  /* spenders */
  .sp{display:flex;align-items:center;gap:11px;padding:9px 0;border-top:1px solid var(--line)}
  .sp:first-child{border-top:none}
  .sp .dot{width:9px;height:9px;border-radius:3px;flex:none}
  .sp.D .dot{background:var(--dem)} .sp.R .dot{background:var(--rep)} .sp.I .dot{background:var(--ind)}
  .sp .nm{flex:1;font-size:15px}
  .sp .amt{font-weight:700;font-variant-numeric:tabular-nums}
  .sp.D .amt{color:var(--dem)} .sp.R .amt{color:var(--rep)} .sp.I .amt{color:var(--ind)}
  .newbadge{font-size:10px;font-weight:800;letter-spacing:.4px;background:color-mix(in srgb,var(--warn) 26%,transparent);color:var(--warn);border-radius:6px;padding:1px 6px;margin-left:7px}
  .buys{margin:2px 0 4px 20px;font-size:13px;color:var(--txt2)}
  .buy{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px dashed var(--line)}
  .buy .meta{color:var(--muted)}
  /* candidate block */
  .cand{display:flex;gap:13px;padding:14px 0;border-top:1px solid var(--line)}
  .cand:first-child{border-top:none}
  .cand .body{flex:1;min-width:0}
  .cand .top{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .cand .nm{font-size:16px;font-weight:700}
  .rel{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  .rel.tracked{color:var(--accent2);font-weight:700}
  .cand .tot{margin-left:auto;font-weight:800;font-variant-numeric:tabular-nums}
  .srow{display:flex;justify-content:space-between;font-size:13.5px;color:var(--txt2);padding:2px 0 2px 4px}
  .srow .amt{color:var(--txt);font-variant-numeric:tabular-nums}
  .srow.sec{opacity:.55;font-size:12px}
  .conf{font-size:10px;padding:1px 6px;border-radius:6px;font-weight:700;text-transform:uppercase}
  .conf.fec{background:color-mix(in srgb,var(--good) 18%,transparent);color:var(--good)}
  .conf.confirmed,.conf.inbox{background:color-mix(in srgb,var(--accent) 22%,transparent);color:var(--accent2)}
  .conf.adimpact{background:color-mix(in srgb,var(--ind) 22%,transparent);color:var(--ind)}
  .conf.estimate{background:color-mix(in srgb,var(--warn) 18%,transparent);color:var(--warn)}
  .ads{margin-top:9px}
  .adsrc{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:8px 0 4px}
  .ad{display:flex;gap:8px;align-items:baseline;font-size:13.5px;padding:2px 0}
  .ad .pl{font-size:10px;color:var(--muted);border:1px solid var(--line2);border-radius:5px;padding:0 5px;flex:none}
  .ad a{color:var(--accent2)} .ad a:hover{text-decoration:underline}
  .coming{font-size:12.5px;color:var(--muted);font-style:italic}
  .empty{color:var(--muted);font-size:13px;font-style:italic}
  .legend{display:flex;flex-wrap:wrap;gap:13px;font-size:12.5px;color:var(--muted);margin:6px 2px 4px;align-items:center}
  @media(max-width:680px){
    .barwrap{display:none} .who{width:140px}
    .dhead{font-size:24px} .matchup{flex-direction:column}
  }
  /* chat widget */
  .chatfab{position:fixed;right:22px;bottom:22px;z-index:50;background:var(--accent);color:#fff;border:none;
    border-radius:999px;padding:13px 18px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.35);display:flex;gap:8px;align-items:center}
  .chatfab:hover{filter:brightness(1.08)}
  .chatpanel{position:fixed;right:22px;bottom:22px;z-index:51;width:min(390px,calc(100vw - 32px));height:min(560px,calc(100vh - 44px));
    background:var(--surface);border:1px solid var(--line2);border-radius:18px;box-shadow:0 12px 48px rgba(0,0,0,.5);display:none;flex-direction:column;overflow:hidden}
  .chatpanel.open{display:flex}
  .chathead{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px;font-weight:700}
  .chathead .x{margin-left:auto;cursor:pointer;color:var(--muted);font-size:18px;background:none;border:none}
  .chathead .ai{font-size:11px;font-weight:600;color:var(--muted)}
  .chatmsgs{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:11px}
  .msg{font-size:14px;line-height:1.5;max-width:88%;padding:10px 13px;border-radius:13px;white-space:pre-wrap}
  .msg.u{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
  .msg.a{align-self:flex-start;background:var(--surface2);color:var(--txt);border-bottom-left-radius:4px}
  .msg.sys{align-self:center;color:var(--muted);font-size:12.5px;text-align:center;background:none}
  .chatin{display:flex;gap:8px;padding:12px;border-top:1px solid var(--line)}
  .chatin input{flex:1;background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:10px 13px;color:var(--txt);font-size:14px;outline:none}
  .chatin button{background:var(--accent);color:#fff;border:none;border-radius:11px;padding:0 15px;font-weight:700;cursor:pointer}
  .chatin button:disabled{opacity:.5}
</style>
</head>
<body>
<div class="topbar"><div class="inner">
  <a class="brand" href="#/"><img class="logo" src="favicon.svg" alt=""> Race Spend Tracker</a>
  <label class="search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
    <input id="q" placeholder="Search race, candidate, office, state…" autocomplete="off">
  </label>
  <button class="iconbtn" id="theme">◐</button>
</div></div>

<div class="wrap"><div id="view"></div></div>

<script src="data/data.js"></script>
<script>
const D = window.TRACKER_DATA || {races:{},candidates:[]};
const $ = s => document.querySelector(s);
const PRI={"confirmed-inbox":5,adimpact:4,FEC:3,"FEC Schedule E":3,estimate:2,sample:0};
const BUCKETS=[["self","Self"],["support","Supporting"],["oppose","Opposing"],["other","Other"]];
const isFed=o=>/\bU\.?S\.?\s+(House|Senate)\b/i.test(o||"");
const elecDate=r=>r.status==="general"?(r.generalDate||"2026-11-03"):(r.primaryDate||r.generalDate);
const slug=n=>(n||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");

function fmt(n){ if(n==null)return"—"; if(!n)return"$0";
  if(n>=1e6)return"$"+(n/1e6).toFixed(n>=1e7?1:2)+"M";
  if(n>=1e3)return"$"+(n/1e3).toFixed(0)+"K"; return"$"+Math.round(n).toLocaleString(); }
function reconcile(c){
  const g={}; for(const r of c.spend||[]){const b=r.bucket||(r.type==="candidate"?"self":"support");(g[b]=g[b]||[]).push(r);}
  let total=0; const out=[];
  for(const[b,lbl]of BUCKETS){const a=g[b];if(!a)continue;
    a.sort((x,z)=>(PRI[z.confidence]||1)-(PRI[x.confidence]||1)||(z.amount||0)-(x.amount||0));
    if(a[0].confidence!=="sample")total+=a[0].amount||0; out.push({lbl,chosen:a[0],others:a.slice(1)});}
  return{total,groups:out};
}
const candTotal=c=>reconcile(c).total;
const byRace=rk=>D.candidates.filter(c=>c.raceKey===rk);
function raceTotal(rk){const r=D.races[rk];if(r&&r.adimpact&&r.adimpact.total)return r.adimpact.total;return byRace(rk).reduce((s,c)=>s+candTotal(c),0);}
function sides(rk){const r=D.races[rk];if(r&&r.adimpact)return{d:r.adimpact.demSide||0,rp:r.adimpact.repSide||0,t:r.adimpact.total||0,src:"AdImpact"};
  let d=0,rp=0;for(const c of byRace(rk)){const t=candTotal(c);if(c.party==="R")rp+=t;else d+=t;}return{d,rp,t:d+rp,src:"FEC/inbox"};}
function ourCand(rk){return byRace(rk).find(c=>c.relationship==="tracked");}
function mainOpp(rk){const cs=byRace(rk);const our=ourCand(rk);
  const opp=cs.filter(c=>c!==our&&c.party&&our&&c.party!==our.party);
  const pool=opp.length?opp:cs.filter(c=>c!==our);
  return pool.sort((a,b)=>candTotal(b)-candTotal(a))[0]||null;}
window.imgFallback=(img,init)=>{const d=document.createElement("div");d.className=img.className;d.textContent=init;img.replaceWith(d);};
function avatar(c,lg){const cls="av "+((c&&c.party||"O").replace(/[^A-Za-z]/g,"")||"O")+(lg?" lg":"");
  const init=(c&&c.name||"?").split(" ").map(x=>x[0]).slice(0,2).join("").toUpperCase();
  if(c&&c.photo)return `<img class="${cls}" src="${c.photo}" alt="" onerror="imgFallback(this,'${init}')">`;
  return `<div class="${cls}">${init}</div>`;}

// ---------- OVERVIEW ----------
function overview(){
  const q=($("#q").value||"").toLowerCase().trim();
  const status=state.status,level=state.level,sort=state.sort;
  let list=Object.keys(D.races).map(rk=>({rk,race:D.races[rk],cands:byRace(rk)}));
  list=list.filter(({race,cands})=>{
    if(status!=="all"&&race.status!==status)return false;
    if(level!=="all"){const f=isFed(race.office);if(level==="federal"&&!f)return false;if(level==="state"&&f)return false;}
    if(q){const hay=(race.office+" "+race.state+" "+cands.map(c=>c.name).join(" ")).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
  list.sort((a,b)=>sort==="spend"?raceTotal(b.rk)-raceTotal(a.rk):sort==="date"?(a.race.primaryDate||a.race.generalDate||"").localeCompare(b.race.primaryDate||b.race.generalDate||""):(a.race.state||"").localeCompare(b.race.state||""));

  const cl=D.changelog||[];
  const updates=`<details class="updates"><summary>📣 What changed
    <span class="latest">${cl[0]?cl[0].note:""}</span><span class="chev">›</span></summary>
    <ul>${cl.slice(0,10).map(e=>`<li><span class="t">${e.ts||"—"}</span>${e.note}</li>`).join("")}</ul></details>`;
  const sub=`<div class="sub">${D.lastUpdated?"Updated "+D.lastUpdated+" · ":""}${Object.keys(D.races).length} races · cycle 2026 · <span style="color:var(--dem)">■</span> Dem <span style="color:var(--rep)">■</span> Rep — bar shows spending advantage</div>`;
  const controls=`<div class="controls">
    <div class="seg" id="segStatus">${[["all","All"],["primary","In primary"],["general","General"]].map(([v,l])=>`<button class="${state.status===v?'on':''}" data-v="${v}">${l}</button>`).join("")}</div>
    <select id="selLevel">${[["all","Federal + State"],["federal","Federal"],["state","State"]].map(([v,l])=>`<option value="${v}" ${state.level===v?'selected':''}>${l}</option>`).join("")}</select>
    <select id="selSort">${[["spend","Sort: race spend"],["date","Sort: next election"],["state","Sort: state"]].map(([v,l])=>`<option value="${v}" ${state.sort===v?'selected':''}>${l}</option>`).join("")}</select>
  </div>`;
  const rows=list.map(({rk,race,cands})=>{
    const s=sides(rk),our=ourCand(rk);const tot=s.t||raceTotal(rk);
    const dPct=tot?Math.max(2,Math.round(s.d/tot*100)):50,rPct=tot?Math.max(2,Math.round(s.rp/tot*100)):0;
    const statusChip=race.status==="general"?`<span class="chip gen">GENERAL</span>`:`<span class="chip pri">PRIMARY · ${race.primaryDate||"TBD"}</span>`;
    return `<a class="rrow" href="#/race/${rk}">
      <div class="rinfo"><div class="rt">${race.office}</div>
        <div class="rmeta">${race.state} ${statusChip}</div></div>
      <div class="barwrap"><div class="bar"><div class="d" style="width:${dPct}%"></div><div class="r" style="width:${rPct}%"></div></div>
        <div class="barlbl"><span class="dem">${fmt(s.d)}</span><b>${fmt(tot)}</b><span class="rep">${fmt(s.rp)}</span></div></div>
      <div class="who">${avatar(our)}<div><div class="nm">${our?our.name:"—"}</div><div class="role">your candidate</div></div></div>
      <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 6 6 6-6 6"/></svg>
    </a>`;
  }).join("");
  $("#view").innerHTML=updates+sub+controls+`<div class="counthd">${list.length} race${list.length!==1?"s":""} · sorted by ${sort}</div>`+(rows||`<p class="empty">No races match.</p>`);
  $("#segStatus").onclick=e=>{const b=e.target.closest("button");if(b){state.status=b.dataset.v;render();}};
  $("#selLevel").onchange=e=>{state.level=e.target.value;render();};
  $("#selSort").onchange=e=>{state.sort=e.target.value;render();};
}

// ---------- DETAIL ----------
function detail(rk){
  const race=D.races[rk]; if(!race){location.hash="#/";return;}
  const cands=byRace(rk),our=ourCand(rk),opp=mainOpp(rk),s=sides(rk),tot=s.t||raceTotal(rk);
  const statusLbl=race.status==="general"?`General · Nov 3`:`Primary · ${race.primaryDate||"TBD"}`;
  const mcard=(c,lbl)=>c?`<div class="mcard ${c.party||'O'}">${avatar(c,true)}<div><div class="nm">${c.name}</div>
    <div class="role">${lbl} · ${c.party||"?"}</div><div class="amt">${fmt(candTotal(c))}</div></div></div>`:`<div class="mcard"><div class="role">—</div></div>`;
  const dPct=tot?Math.round(s.d/tot*100):50,rPct=tot?Math.round(s.rp/tot*100):0;
  const bigbar=`<div class="bigbar"><div class="seg2 d" style="width:${Math.max(8,dPct)}%">${fmt(s.d)}</div><div class="seg2 r" style="width:${Math.max(8,rPct)}%">${fmt(s.rp)}</div></div>
    <div class="bbnum"><span>Dem side</span><span>Total <b style="color:var(--txt)">${fmt(tot)}</b> · ${s.src}${race.adimpact&&race.adimpact.asOf?" · "+race.adimpact.asOf:""}</span><span>Rep side</span></div>`;

  // ---- media-week × market grid (buyers' view) ----
  const buys=race.buys||[]; let weekgrid="";
  if(buys.length){
    const dim=state.gridDim||"market";
    const allWeeks=[...new Set(buys.map(b=>b.week).filter(w=>w!=null))].sort((a,z)=>a-z);
    const WINDOW=state.gridAll?999:24; // default: last ~6 months to Nov; toggle shows all
    const weeks=allWeeks.filter(w=>w>=0&&w<=WINDOW);
    const earlier=allWeeks.filter(w=>w>WINDOW).length;
    const wkDates={}; for(const b of buys){if(b.week!=null&&!wkDates[b.week]&&b.flightStart)wkDates[b.week]={s:b.flightStart,e:b.flightEnd};}
    const md=s=>s?s.slice(5).replace('-','/'):"";
    const wlab=w=>w<=0?"Elec wk":("W"+w);
    const keyOf=b=>dim==="market"?(b.market||"?"):(b.advertiser||"?");
    const rows=[...new Set(buys.map(keyOf))];
    const cell=(r,w)=>buys.filter(b=>keyOf(b)===r&&b.week===w).reduce((s,b)=>s+(b.amount||0),0);
    const rowTot=r=>buys.filter(b=>keyOf(b)===r).reduce((s,b)=>s+(b.amount||0),0);
    const colTot=w=>buys.filter(b=>b.week===w).reduce((s,b)=>s+(b.amount||0),0);
    rows.sort((a,b)=>rowTot(b)-rowTot(a));
    const head=`<tr><th class="mkt">${dim==="market"?"Market":"Advertiser"}</th>`
      +weeks.map(w=>`<th class="wk">${wlab(w)}${wkDates[w]?`<small>${md(wkDates[w].s)}–${md(wkDates[w].e)}</small>`:""}</th>`).join("")
      +`<th class="rtot">Total</th></tr>`;
    const body=rows.map(r=>`<tr><td class="mkt">${r}</td>`
      +weeks.map(w=>{const v=cell(r,w);return `<td class="${v?"cell":"zero"}">${v?fmt(v):"·"}</td>`}).join("")
      +`<td class="rtot">${fmt(rowTot(r))}</td></tr>`).join("");
    const totrow=`<tr class="tot"><td class="mkt">All</td>`+weeks.map(w=>`<td>${fmt(colTot(w))}</td>`).join("")+`<td class="rtot">${fmt(buys.reduce((s,b)=>s+(b.amount||0),0))}</td></tr>`;
    weekgrid=`<div class="panel"><h3>Media-week spend by ${dim}
      <span class="gridtoggle" onclick="window.toggleGrid()">↔ by ${dim==="market"?"advertiser":"market"}</span></h3>
      <div class="wgridwrap"><table class="wgrid">${head}${body}${totrow}</table></div>
      <div class="wknote">Media weeks run Tue–Mon · W1 = week before the Nov 3 general, counting back.${earlier?` <span class="gridtoggle" onclick="window.toggleGridAll()">${state.gridAll?'show recent only':'+ '+earlier+' earlier weeks'}</span>`:''}</div></div>`;
  }

  const sp=[...(race.spenders||[])].sort((a,b)=>(b.isNew?1:0)-(a.isNew?1:0)||(b.amount||0)-(a.amount||0));
  const spenders=sp.length?`<div class="panel"><h3>Spenders · ${sp.length} (AdImpact${sp.some(x=>x.source==='inbox')?' + inbox':''})</h3>`
    +sp.map(x=>`<div class="sp ${x.side}"><span class="dot"></span><span class="nm">${x.name}${x.isNew?'<span class="newbadge">NEW</span>':''}</span><span class="amt">${fmt(x.amount)}</span></div>`
      +(x.inbox?`<div class="buys"><div class="buy"><span class="meta">inbox${x.inbox.flight?' · '+x.inbox.flight:''}</span><span>${fmt(x.inbox.amount)}</span></div></div>`:"")).join("")
    +`</div>`:"";

  const candBlock=c=>{
    const rec=reconcile(c),relTxt={tracked:"Your candidate","primary-opp":"Primary rival","general-opp":"General opponent"}[c.relationship]||c.relationship;
    const spend=rec.groups.length?rec.groups.map(g=>{const x=g.chosen;
      return `<div class="srow"><span>${g.lbl} · ${x.actor||""} <span class="conf ${cls(x.confidence)}">${lab(x.confidence)}</span>${x.flight?' · '+x.flight:''}</span><span class="amt">${fmt(x.amount)}</span></div>`
        +g.others.map(o=>`<div class="srow sec"><span>also ${o.actor||""} <span class="conf ${cls(o.confidence)}">${lab(o.confidence)}</span></span><span class="amt">${fmt(o.amount)}</span></div>`).join("");}).join("")
      :`<div class="empty">no spend recorded yet</div>`;
    const yt=(c.ads||[]).filter(a=>a.platform==="YouTube");
    const ads=`<div class="ads"><div class="adsrc">YouTube ads ${yt.length?`(${yt.length})`:''}</div>`
      +(yt.length?yt.slice(0,4).map(a=>`<div class="ad"><span class="pl">YT</span><a href="${a.url}" target="_blank" rel="noopener">${(a.title||'ad').slice(0,52)}</a></div>`).join(""):`<div class="coming">none detected yet</div>`)
      +`<div class="adsrc">Meta · Google ads</div><div class="coming">digital tracking — coming</div></div>`;
    return `<div class="cand">${avatar(c)}<div class="body">
      <div class="top"><span class="nm">${c.name}</span><span class="rel ${c.relationship==='tracked'?'tracked':''}">${relTxt}</span><span class="conf" style="background:none;color:var(--muted)">${c.party||""}</span><span class="tot">${fmt(rec.total)}</span></div>
      ${spend}${ads}</div></div>`;
  };
  const order={tracked:0,"general-opp":1,"primary-opp":2};
  const field=`<div class="panel"><h3>Full field · ${cands.length}</h3>`
    +[...cands].sort((a,b)=>(order[a.relationship]??3)-(order[b.relationship]??3)||candTotal(b)-candTotal(a)).map(candBlock).join("")+`</div>`;

  $("#view").innerHTML=`<div class="back" onclick="history.length>1?history.back():location.hash='#/'">‹ All races</div>
    <div class="dhead">${race.office}</div>
    <div class="dmeta">${race.state} · ${statusLbl}</div>
    ${race.seatHeldBy?`<div class="seat">Seat: ${race.seatHeldBy}</div>`:""}
    <div class="matchup">${mcard(our,"Your candidate")}<div class="vs">vs</div>${mcard(opp,opp&&opp.relationship==='general-opp'?'General opponent':'Top rival')}</div>
    <div class="panel"><h3>Spending advantage</h3>${bigbar}</div>
    ${weekgrid}
    ${spenders}${field}`;
}
function cls(c){return({FEC:"fec","FEC Schedule E":"fec","confirmed-inbox":"confirmed",adimpact:"adimpact",estimate:"estimate",sample:"estimate"})[c]||"estimate";}
function lab(c){return({FEC:"FEC","FEC Schedule E":"FEC","confirmed-inbox":"Inbox",adimpact:"AdImpact",estimate:"Est",sample:"Sample"})[c]||"Est";}

// ---------- router ----------
const state={status:"all",level:"all",sort:"spend",gridDim:"market",gridAll:false};
window.toggleGrid=()=>{state.gridDim=state.gridDim==="advertiser"?"market":"advertiser";render();};
window.toggleGridAll=()=>{state.gridAll=!state.gridAll;render();};
function render(){
  const h=location.hash||"#/";
  const m=h.match(/#\/race\/(.+)/);
  if(m){detail(decodeURIComponent(m[1]));window.scrollTo(0,0);}
  else overview();
}
window.addEventListener("hashchange",render);
$("#q").addEventListener("input",()=>{ if(location.hash&&location.hash!=="#/")location.hash="#/"; else overview(); });
$("#theme").addEventListener("click",()=>{const t=document.documentElement.dataset.theme==="light"?"dark":"light";document.documentElement.dataset.theme=t;localStorage.spendTheme=t;});
document.documentElement.dataset.theme=localStorage.spendTheme||"dark";
render();
</script>

<button class="chatfab" id="chatfab">💬 Ask about the data</button>
<div class="chatpanel" id="chatpanel">
  <div class="chathead">🎯 Spend Assistant <span class="ai">Claude Haiku</span><button class="x" id="chatx">✕</button></div>
  <div class="chatmsgs" id="chatmsgs"><div class="msg sys">Ask anything about the spend — e.g. "Who's the biggest outside spender against El-Sayed?" or "Which races have the most total spending?"</div></div>
  <div class="chatin"><input id="chatq" placeholder="Ask a question…" autocomplete="off"><button id="chatsend">Send</button></div>
</div>
<script>
const CHAT_WORKER = "https://spend-tracker-chat.flippypdf.workers.dev";
function chatContext(){
  const D=window.TRACKER_DATA||{races:{},candidates:[]};
  const lines=[];
  for(const rk of Object.keys(D.races)){
    const r=D.races[rk], cs=D.candidates.filter(c=>c.raceKey===rk);
    const a=r.adimpact; const our=cs.find(c=>c.relationship==='tracked');
    const tot=(c)=>{const g={};for(const s of c.spend||[]){const b=s.bucket||'self';if(!g[b]||(s.amount||0)>g[b])g[b]=s.amount||0;}return Object.values(g).reduce((x,y)=>x+y,0);};
    let l=`${r.office} (${r.state}, ${r.status}${r.primaryDate?' '+r.primaryDate:''})`;
    if(a)l+=`: Dem $${a.demSide||0} / Rep $${a.repSide||0} / total $${a.total||0}`;
    if(r.spenders&&r.spenders.length)l+=`. Spenders: `+r.spenders.slice(0,6).map(s=>`${s.name} $${s.amount}(${s.side})`).join(', ');
    const named=cs.filter(c=>c.relationship==='tracked'||c.relationship==='general-opp').map(c=>`${c.name}[${c.relationship==='tracked'?'ours':'opp'},${c.party}] $${Math.round(tot(c))}`);
    if(named.length)l+=`. Candidates: `+named.join(', ');
    lines.push(l);
  }
  return lines.join('\n').slice(0,22000);
}
const fab=document.getElementById('chatfab'),panel=document.getElementById('chatpanel'),msgs=document.getElementById('chatmsgs'),qin=document.getElementById('chatq'),send=document.getElementById('chatsend');
fab.onclick=()=>{panel.classList.add('open');fab.style.display='none';qin.focus();};
document.getElementById('chatx').onclick=()=>{panel.classList.remove('open');fab.style.display='flex';};
function addMsg(t,cls){const d=document.createElement('div');d.className='msg '+cls;d.textContent=t;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;return d;}
async function ask(){
  const q=qin.value.trim(); if(!q)return;
  if(CHAT_WORKER.indexOf('__')===0){addMsg('Chatbot is being set up — check back shortly.','sys');return;}
  qin.value='';addMsg(q,'u');send.disabled=true;const wait=addMsg('…','a');
  try{
    const r=await fetch(CHAT_WORKER,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q,context:chatContext()})});
    const j=await r.json();wait.textContent=j.answer||j.error||'(no response)';
  }catch(e){wait.textContent='Network error — try again.';}
  send.disabled=false;qin.focus();
}
send.onclick=ask; qin.addEventListener('keydown',e=>{if(e.key==='Enter')ask();});
</script>
</body>
</html>
