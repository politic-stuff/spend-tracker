<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Race Spend Tracker — 2026</title>
<link rel="icon" href="favicon.svg">
<style>
  :root{
    --bg:#0b0f17; --card:#141a26; --card2:#1b2230; --line:#26304a;
    --txt:#e7ecf5; --muted:#9aa6bd; --accent:#5b8cff; --accent2:#7aa2ff;
    --dem:#5b8cff; --rep:#e0606b; --ind:#c08adb;
    --fed:#3fb98a; --state:#c08adb; --warn:#e6a23c; --good:#3fb98a; --info:#5b8cff; --sample:#6b7689;
  }
  [data-theme="light"]{ --bg:#f4f6fb; --card:#fff; --card2:#eef2fa; --line:#dde3ef; --txt:#10151f; --muted:#5a6577; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  a{color:var(--accent2);text-decoration:none} a:hover{text-decoration:underline}
  .wrap{max-width:1180px;margin:0 auto;padding:20px 18px 80px}
  header{display:flex;flex-wrap:wrap;align-items:center;gap:12px}
  h1{font-size:22px;margin:0}
  .sub{color:var(--muted);font-size:13px;margin:2px 0 16px}
  .spacer{flex:1}
  .btn{background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:7px 11px;font-size:13px;cursor:pointer}
  .btn:hover{border-color:var(--accent)}
  .controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
  .controls input,.controls select{background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:8px 10px;font-size:13px}
  .controls input{flex:1;min-width:200px}
  .legend{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--muted);margin-bottom:16px;align-items:center}
  .legend b{color:var(--txt);font-weight:600}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid var(--line);white-space:nowrap}
  .conf{font-size:10px;padding:1px 6px;border-radius:6px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
  .conf.fec{background:color-mix(in srgb,var(--fed) 20%,transparent);color:var(--fed)}
  .conf.confirmed{background:color-mix(in srgb,var(--info) 22%,transparent);color:var(--accent2)}
  .conf.adimpact{background:color-mix(in srgb,var(--accent) 26%,transparent);color:var(--accent2)}
  .conf.estimate{background:color-mix(in srgb,var(--warn) 20%,transparent);color:var(--warn)}
  .conf.sample{background:color-mix(in srgb,var(--sample) 22%,transparent);color:var(--sample)}
  .party{font-size:10px;font-weight:800;padding:1px 6px;border-radius:5px}
  .party.D{background:color-mix(in srgb,var(--dem) 22%,transparent);color:var(--dem)}
  .party.R{background:color-mix(in srgb,var(--rep) 22%,transparent);color:var(--rep)}
  .party.I,.party.Independent,.party.O{background:color-mix(in srgb,var(--ind) 22%,transparent);color:var(--ind)}
  .changelog{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:18px}
  .changelog h3{margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .changelog li{font-size:13px;margin-bottom:4px} .changelog .t{color:var(--muted);font-size:11px}
  .race{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:14px}
  .racehead{display:flex;flex-wrap:wrap;align-items:baseline;gap:8px;margin-bottom:2px}
  .rtitle{font-size:17px;font-weight:700}
  .rmeta{color:var(--muted);font-size:12.5px}
  .seat{color:var(--muted);font-size:12px;margin:2px 0 0}
  .adbar{display:flex;gap:10px;margin:12px 0;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .adcell{flex:1;text-align:center;padding:9px 6px}
  .adcell .lab{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  .adcell .val{font-size:19px;font-weight:800;font-variant-numeric:tabular-nums}
  .adcell.dem{background:color-mix(in srgb,var(--dem) 12%,transparent)} .adcell.dem .val{color:var(--dem)}
  .adcell.rep{background:color-mix(in srgb,var(--rep) 12%,transparent)} .adcell.rep .val{color:var(--rep)}
  .adcell.tot .val{color:var(--txt)}
  .adsrc{font-size:10px;color:var(--muted);text-align:right;margin:-6px 0 8px}
  .spenders{margin:8px 0 4px;border-top:1px solid var(--line);padding-top:8px}
  .spenders h4{margin:0 0 6px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .spender{display:flex;align-items:center;gap:7px;font-size:12.5px;padding:2px 0}
  .spender .dot{width:7px;height:7px;border-radius:2px;flex:none}
  .spender.D .dot{background:var(--dem)} .spender.R .dot{background:var(--rep)} .spender.I .dot{background:var(--ind)}
  .spender .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .spender .amt{font-variant-numeric:tabular-nums;font-weight:600}
  .spender.D .amt{color:var(--dem)} .spender.R .amt{color:var(--rep)} .spender.I .amt{color:var(--ind)}
  .spenders .more{font-size:11px;color:var(--muted);margin-top:3px;cursor:pointer}
  .cand{border-top:1px solid var(--line);padding:9px 0}
  .cand.tracked{background:color-mix(in srgb,var(--accent) 7%,transparent);margin:0 -16px;padding:9px 16px;border-top:1px solid var(--line)}
  .cand .top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .cand .nm{font-weight:600}
  .rel{font-size:10px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted)}
  .rel.tracked{color:var(--accent2);font-weight:700}
  .candtot{margin-left:auto;font-weight:800;font-variant-numeric:tabular-nums}
  .srow{display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);padding:2px 0 2px 12px}
  .srow .amt{font-variant-numeric:tabular-nums;color:var(--txt)}
  .srow.sec{opacity:.5;font-size:11px}
  .bkt{text-transform:uppercase;font-size:10px;letter-spacing:.3px}
  .ads{font-size:12px;color:var(--muted);padding:2px 0 0 12px}
  .ads a{margin-right:2px}
  .empty{color:var(--muted);font-style:italic;font-size:12px}
  .sectionhead{margin:18px 0 10px;font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <header><h1>🎯 Race Spend Tracker</h1><span class="spacer"></span><button class="btn" id="theme">◐ Theme</button></header>
  <div class="sub" id="updated">Loading…</div>

  <div class="changelog" id="changelog" hidden><h3>What changed</h3><ul id="changelist"></ul></div>

  <div class="controls">
    <input id="q" placeholder="Search race, candidate, office, state…">
    <select id="status"><option value="all">All races</option><option value="primary">In primary</option><option value="general">General election</option></select>
    <select id="level"><option value="all">Federal + State</option><option value="federal">Federal</option><option value="state">State</option></select>
    <select id="sort"><option value="spend">Sort: race spend</option><option value="date">Sort: next election</option><option value="state">Sort: state</option></select>
  </div>

  <div class="legend">
    <span><b>Who:</b></span>
    <span><span class="rel tracked">Our candidate</span></span>
    <span>primary rival</span><span>general opponent</span>
    <span><span class="party D">D</span><span class="party R">R</span><span class="party I">I</span></span>
    <span style="margin-left:8px"><b>Source:</b></span>
    <span><span class="conf confirmed">Inbox</span></span><span><span class="conf adimpact">AdImpact</span></span>
    <span><span class="conf fec">FEC</span></span><span><span class="conf estimate">Est</span></span>
  </div>

  <div id="board"></div>
</div>

<script src="data/data.js"></script>
<script>
const D = window.TRACKER_DATA || {races:{},candidates:[]};
const $ = s => document.querySelector(s);
const PRI={"confirmed-inbox":5,adimpact:4,FEC:3,"FEC Schedule E":3,estimate:2,sample:0};
const BUCKETS=[["self","Self"],["support","Supporting"],["oppose","Opposing"],["other","Other"]];

function fmt(n){ if(n==null) return "—"; if(!n) return "$0";
  if(n>=1e6) return "$"+(n/1e6).toFixed(n>=1e7?1:2)+"M";
  if(n>=1e3) return "$"+(n/1e3).toFixed(0)+"K"; return "$"+Math.round(n).toLocaleString(); }

function reconcile(c){
  const g={}; for(const r of c.spend||[]){const b=r.bucket||(r.type==="candidate"?"self":"support");(g[b]=g[b]||[]).push(r);}
  let total=0; const out=[];
  for(const [b,lbl] of BUCKETS){const arr=g[b]; if(!arr) continue;
    arr.sort((a,z)=>(PRI[z.confidence]||1)-(PRI[a.confidence]||1)||(z.amount||0)-(a.amount||0));
    if(arr[0].confidence!=="sample") total+=arr[0].amount||0;
    out.push({lbl,chosen:arr[0],others:arr.slice(1)});}
  return {total,groups:out};
}
const candTotal=c=>reconcile(c).total;
function raceTotal(rk,cands){const r=D.races[rk]; if(r&&r.adimpact&&r.adimpact.total) return r.adimpact.total;
  return cands.reduce((s,c)=>s+candTotal(c),0);}
const isFed=office=>/\bU\.?S\.?\s+(House|Senate)\b/i.test(office||"");

$("#updated").textContent = (D.lastUpdated?`Last updated ${D.lastUpdated} · `:"")+
  `${D.counts?.races||Object.keys(D.races).length} races · ${D.counts?.candidates||D.candidates.length} candidates (incl. opponents) · cycle 2026`;
if(D.changelog&&D.changelog.length){$("#changelog").hidden=false;
  $("#changelist").innerHTML=D.changelog.slice(0,7).map(e=>`<li><span class="t">${e.ts||"—"}</span> · ${e.note}</li>`).join("");}

function render(){
  const q=$("#q").value.toLowerCase().trim(), status=$("#status").value, level=$("#level").value, sort=$("#sort").value;
  const byRace={}; for(const c of D.candidates){(byRace[c.raceKey]=byRace[c.raceKey]||[]).push(c);}
  let list=Object.keys(D.races).map(rk=>({rk,race:D.races[rk],cands:byRace[rk]||[]}));
  list=list.filter(({race,cands})=>{
    if(status!=="all"&&race.status!==status) return false;
    if(level!=="all"){const fed=isFed(race.office); if(level==="federal"&&!fed)return false; if(level==="state"&&fed)return false;}
    if(q){const hay=(race.office+" "+race.state+" "+cands.map(c=>c.name).join(" ")).toLowerCase(); if(!hay.includes(q))return false;}
    return true;
  });
  list.sort((a,b)=>{
    if(sort==="spend")return raceTotal(b.rk,b.cands)-raceTotal(a.rk,a.cands);
    if(sort==="date")return (a.race.primaryDate||a.race.generalDate||"").localeCompare(b.race.primaryDate||b.race.generalDate||"");
    return (a.race.state||"").localeCompare(b.race.state||"");
  });
  const board=$("#board");
  if(!list.length){board.innerHTML='<p class="empty">No races match.</p>';return;}
  board.innerHTML=`<div class="sectionhead">${list.length} race${list.length>1?"s":""} · sorted by ${sort}</div>`+list.map(raceCard).join("");
}

function raceCard({rk,race,cands}){
  const order={tracked:0,"general-opp":1,"primary-opp":2};
  cands=[...cands].sort((a,b)=>(order[a.relationship]??3)-(order[b.relationship]??3)||candTotal(b)-candTotal(a));
  const ai=race.adimpact;
  const adbar = ai && (ai.demSide!=null||ai.repSide!=null) ? `
    <div class="adbar">
      <div class="adcell dem"><div class="lab">Dem side</div><div class="val">${fmt(ai.demSide)}</div></div>
      <div class="adcell tot"><div class="lab">Total</div><div class="val">${fmt(ai.total)}</div></div>
      <div class="adcell rep"><div class="lab">Rep side</div><div class="val">${fmt(ai.repSide)}</div></div>
    </div><div class="adsrc">race totals · AdImpact${ai.asOf?" · "+ai.asOf:""}</div>` : "";
  const statusLabel = race.status==="general" ? "General · Nov 3" : `Primary · ${race.primaryDate||"TBD"}`;
  const sp = race.spenders||[];
  const spenders = sp.length ? `<div class="spenders"><h4>Top spenders · ${sp.length} (AdImpact)</h4>`
    + sp.slice(0,8).map(s=>`<div class="spender ${s.side}"><span class="dot"></span><span class="nm">${s.name}</span><span class="amt">${fmt(s.amount)}</span></div>`).join("")
    + (sp.length>8?`<div class="more">+${sp.length-8} more</div>`:"")+`</div>` : "";
  return `<div class="race">
    <div class="racehead"><span class="rtitle">${race.office}</span><span class="rmeta">· ${race.state} · ${statusLabel}</span></div>
    ${race.seatHeldBy?`<div class="seat">Seat: ${race.seatHeldBy}</div>`:""}
    ${adbar}
    ${spenders}
    ${cands.map(candRow).join("")}
  </div>`;
}

function candRow(c){
  const rec=reconcile(c), t=rec.total;
  const relTxt={tracked:"Our candidate","primary-opp":"primary rival","general-opp":"general opponent"}[c.relationship]||c.relationship;
  const spend = rec.groups.length ? rec.groups.map(g=>{
    const s=g.chosen;
    return `<div class="srow"><span><span class="bkt">${g.lbl}</span> ${s.actor||""} <span class="conf ${cls(s.confidence)}">${lab(s.confidence)}</span></span><span class="amt">${fmt(s.amount)}</span></div>`
      + g.others.map(o=>`<div class="srow sec"><span>also: ${o.actor||""} <span class="conf ${cls(o.confidence)}">${lab(o.confidence)}</span></span><span class="amt">${fmt(o.amount)}</span></div>`).join("");
  }).join("") : `<div class="srow"><span class="empty">no spend recorded${c.level==='state'?' (state race — via inbox/AdImpact)':' yet'}</span></div>`;
  const ads=(c.ads||[]).length?`<div class="ads">ads: ${c.ads.slice(0,3).map(a=>`<a href="${a.url}" target="_blank" rel="noopener">${(a.title||'ad').slice(0,34)}</a>`).join(" · ")}</div>`:"";
  return `<div class="cand ${c.relationship==='tracked'?'tracked':''}">
    <div class="top">
      <span class="party ${(c.party||'O').replace(/[^A-Za-z]/g,'')}">${(c.party||'?').slice(0,1)}</span>
      <span class="nm">${c.name}</span>
      <span class="rel ${c.relationship==='tracked'?'tracked':''}">${relTxt}</span>
      <span class="candtot">${fmt(t)}</span>
    </div>${spend}${ads}
  </div>`;
}
function cls(c){return ({FEC:"fec","FEC Schedule E":"fec","confirmed-inbox":"confirmed",adimpact:"adimpact",estimate:"estimate",sample:"sample"})[c]||"estimate";}
function lab(c){return ({FEC:"FEC","FEC Schedule E":"FEC","confirmed-inbox":"Inbox",adimpact:"AdImpact",estimate:"Est",sample:"Sample"})[c]||"Est";}

["q","status","level","sort"].forEach(id=>$("#"+id).addEventListener("input",render));
const th=$("#theme");
const applyTheme=t=>{document.documentElement.dataset.theme=t;localStorage.spendTheme=t;};
th.addEventListener("click",()=>applyTheme(document.documentElement.dataset.theme==="light"?"dark":"light"));
applyTheme(localStorage.spendTheme||"dark");
render();
</script>
</body>
</html>
